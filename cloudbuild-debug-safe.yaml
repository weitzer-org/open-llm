steps:
  # 1. Run terraform init and plan with -input=false and || true to prevent hangs/early exits
  - name: 'hashicorp/terraform:1.9.3'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        mkdir -p /workspace/logs
        cd terraform
        echo "=== TERRAFORM INIT ===" > /workspace/logs/tf_log.txt
        terraform init -input=false -no-color >> /workspace/logs/tf_log.txt 2>&1
        INIT_CODE=$$?
        echo "Init Exit Code: $$INIT_CODE" >> /workspace/logs/tf_log.txt
        
        if [ $$INIT_CODE -eq 0 ]; then
          echo "\n=== TERRAFORM PLAN ===" >> /workspace/logs/tf_log.txt
          terraform plan -var="project_id=quacktastic-waffle" -input=false -no-color >> /workspace/logs/tf_log.txt 2>&1
          PLAN_CODE=$$?
          echo "Plan Exit Code: $$PLAN_CODE" >> /workspace/logs/tf_log.txt
        else
          echo "\n=== SKIPPING PLAN DUE TO INIT FAILURE ===" >> /workspace/logs/tf_log.txt
        fi

  # 2. Force-upload the captured logs to GCS bucket (will always execute since first step returns exit code 0)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud storage cp /workspace/logs/tf_log.txt gs://quacktastic-waffle_cloudbuild/logs/tf_log.txt
