steps:
  # 1. Run targeted secrets apply and log outcomes safely
  - name: 'hashicorp/terraform:1.9.3'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        mkdir -p /workspace/logs
        cd terraform
        echo "=== TERRAFORM INIT ===" > /workspace/logs/secret_log.txt
        terraform init -input=false -no-color >> /workspace/logs/secret_log.txt 2>&1
        INIT_CODE=$?
        echo "Init Exit Code: $INIT_CODE" >> /workspace/logs/secret_log.txt
        
        if [ $INIT_CODE -eq 0 ]; then
          echo "\n=== TERRAFORM SECRETS APPLY ===" >> /workspace/logs/secret_log.txt
          terraform apply \
            -target=google_secret_manager_secret.api_auth_secret \
            -target=random_password.api_auth_secret \
            -target=google_secret_manager_secret_version.api_auth_secret \
            -target=google_secret_manager_secret_iam_member.gateway_secret_accessor \
            -target=google_secret_manager_secret_iam_member.jetski_secret_accessor \
            -auto-approve \
            -var="project_id=quacktastic-waffle" \
            -input=false -no-color >> /workspace/logs/secret_log.txt 2>&1
          APPLY_CODE=$?
          echo "Apply Exit Code: $APPLY_CODE" >> /workspace/logs/secret_log.txt
        fi
        exit 0

  # 2. Upload log outcomes safely regardless of step results
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud storage cp /workspace/logs/secret_log.txt gs://quacktastic-waffle_cloudbuild/logs/secret_log.txt
