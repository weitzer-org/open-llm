steps:
  # 1. Run targeted terraform apply to create Secret Manager resources cleanly
  - name: 'hashicorp/terraform:1.9.3'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform && \
        terraform init && \
        terraform apply \
          -target=google_secret_manager_secret.api_auth_secret \
          -target=random_password.api_auth_secret \
          -target=google_secret_manager_secret_version.api_auth_secret \
          -target=google_secret_manager_secret_iam_member.gateway_secret_accessor \
          -target=google_secret_manager_secret_iam_member.jetski_secret_accessor \
          -auto-approve \
          -var="project_id=quacktastic-waffle"
